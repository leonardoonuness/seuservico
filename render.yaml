services:
  - type: web
    name: seuservico-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn app.main:socket_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: seuservico-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: seuservico-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: UPLOAD_DIR
        value: uploads

  - type: worker
    name: seuservico-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seuservico-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: seuservico-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: UPLOAD_DIR
        value: uploads

  - type: cron
    name: seuservico-cron-cleanup
    env: docker
    plan: starter
    schedule: "0 3 * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: celery -A app.tasks.celery_app call app.tasks.cleanup.cleanup_expired_tokens
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seuservico-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: seuservico-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: seuservico-db
    plan: starter
    databaseName: seuservico
    user: seuservico

keyvalue:
  - name: seuservico-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
