services:
  - type: web
    name: seuservico-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn app.main:socket_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: seuservico-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: UPLOAD_DIR
        value: uploads
      - key: REDIS_URL
        value: ""

databases:
  - name: seuservico-db
    plan: free
    databaseName: seuservico
    user: seuservico
